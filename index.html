<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangZz!! - Links</title>
    <style>
        /* Reset & Base Style */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #03050a; 
        }

        /* Container Utama untuk Partikel */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #020408 0%, #080d1a 100%);
            z-index: 1;
        }

        /* Konten Linktree di atas Partikel */
        .linktree-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 40px 25px 25px 25px;
            background: rgba(4, 7, 15, 0.6);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.2); 
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.15), 0 10px 40px 0 rgba(0, 0, 0, 0.8);
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Status Online di Atas Kanan */
        .status-online {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 1.5s infinite;
        }

        .status-text {
            color: #10b981;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Profil */
        .profile-img {
            display: block;       
            margin: 0 auto 20px auto; 
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #06b6d4; 
            object-fit: cover;
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.8);
        }

        /* JUDUL PUZZLE BALOK BLOCK BLAST (LOOPING) */
        .profile-name {
            display: flex;
            justify-content: center;
            gap: 6px;               
            margin-bottom: 20px;
            perspective: 800px;
        }

        .profile-name span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 6px;     
            background: linear-gradient(135deg, #0891b2 0%, #0369a1 100%);
            border-top: 2px solid #22d3ee;
            border-left: 2px solid #22d3ee;
            border-right: 2px solid #0369a1;
            border-bottom: 3px solid #014f7a;
            box-shadow: 0 4px 10px rgba(6, 182, 212, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            opacity: 0;
            transform: translateY(-250px) scale(1.2);
            animation: blockBlastFallLoop 4s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        }

        .profile-name span:nth-child(even) {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border-top: 2px solid #67e8f9;
            border-left: 2px solid #67e8f9;
        }
        
        .profile-name span:nth-child(1) { animation-delay: 0.1s; }
        .profile-name span:nth-child(2) { animation-delay: 0.2s; }
        .profile-name span:nth-child(3) { animation-delay: 0.3s; }
        .profile-name span:nth-child(4) { animation-delay: 0.4s; }
        .profile-name span:nth-child(5) { animation-delay: 0.5s; }
        .profile-name span:nth-child(6) { animation-delay: 0.6s; }
        .profile-name span:nth-child(7) { animation-delay: 0.7s; }
        .profile-name span:nth-child(8) { animation-delay: 0.8s; }

        @keyframes blockBlastFallLoop {
            0% { opacity: 0; transform: translateY(-250px) scale(1.3) rotate(-10deg); }
            8% { opacity: 1; transform: translateY(0) scale(0.9, 1.15) rotate(0deg); }
            12% { transform: translateY(-6px) scale(1.05, 0.95); }
            15% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
            75% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
            83% { opacity: 0; transform: translateY(30px) scale(0.8); }
            100% { opacity: 0; transform: translateY(-250px) scale(1.2); }
        }

        .profile-bio {
            color: #f3f4f6;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Wrapper Daftar Tautan */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        /* EFFEK TOMBOL PARTIKEL LASER (CYBERPUNK NEON SWEEP) */
        .link-item {
            display: block;
            padding: 15px 20px;
            background: rgba(4, 15, 30, 0.6);
            color: #ffffff;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            position: relative;
            overflow: hidden; /* Memotong radiasi sinar laser di luar tombol */
            border: 1px solid rgba(6, 182, 212, 0.3);
            box-shadow: inset 0 0 12px rgba(6, 182, 212, 0.1);
            transition: all 0.3s ease;
        }

        /* Garis Kilatan Laser Neon Horizontal */
        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 240, 255, 0.2),
                rgba(0, 240, 255, 0.8), /* Inti sinar laser terang */
                rgba(0, 240, 255, 0.2),
                transparent
            );
            animation: laserSweep 3.5s infinite linear;
        }

        /* Titik Partikel Energi di Sudut Tombol */
        .link-item::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00f0ff;
            border-radius: 50%;
            top: 0;
            left: 0;
            opacity: 0;
            box-shadow: 0 0 12px 2px #00f0ff;
            transition: opacity 0.3s ease;
        }

        /* Perubahan Saat Tombol Disentuh (Hover & Active) */
        .link-item:hover {
            color: #000000;
            background: #06b6d4;
            border-color: #00f0ff;
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.85), inset 0 0 10px rgba(255, 255, 255, 0.5);
            font-weight: 700;
        }

        .link-item:hover::after {
            opacity: 1;
            animation: laserParticleEdge 2s infinite linear;
        }

        /* Jeda Animasi Laser Biar Tidak Barengan Jatuhnya */
        .links-wrapper .link-item:nth-child(1)::before { animation-delay: 0s; }
        .links-wrapper .link-item:nth-child(2)::before { animation-delay: 0.8s; }
        .links-wrapper .link-item:nth-child(3)::before { animation-delay: 1.6s; }
        .links-wrapper .link-item:nth-child(4)::before { animation-delay: 2.4s; }

        /* Animasi Sapuan Garis Laser */
        @keyframes laserSweep {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        /* Gerakan Partikel Mengitari Pinggiran Tombol Saat Di-hover */
        @keyframes laserParticleEdge {
            0% { top: 0; left: 0; }
            25% { top: 0; left: 100%; transform: translateX(-4px); }
            50% { top: 100%; left: 100%; transform: translate(-4px, -4px); }
            75% { top: 100%; left: 0; transform: translateY(-4px); }
            100% { top: 0; left: 0; }
        }

        /* Watermark Footer */
        .footer-copyright {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Sembunyikan scrollbar */
        .linktree-container::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
